<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in to AMP</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="screen">
    <div class="card">
      <p class="eyebrow">Welcome back</p>
      <h1>Log in</h1>
      <p class="tagline" style="text-align:left; margin-bottom:20px;">Pick up your feed, your playlists, your shows.</p>

      <form id="login-form" novalidate>
        <div data-error hidden></div>

        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required autocomplete="email" />
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required autocomplete="current-password" />
        </div>

        <button type="submit" class="btn btn-primary" data-submit data-default-label="Log in">Log in</button>
      </form>

      <p class="form-footer">New to AMP? <a href="signup.html">Create an account</a></p>
    </div>
  </div>

  <script type="module">
    import { handleLogin } from "./js/auth.js";
    document.getElementById("login-form").addEventListener("submit", handleLogin);
  </script>
</body>
</html>
