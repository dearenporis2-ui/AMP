<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your panel — AMP</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <span class="brand-mark small">AMP</span>
      <div class="topbar-right">
        <span class="badge" id="status-badge">…</span>
        <button type="button" class="btn-ghost" id="signout-btn">Sign out</button>
      </div>
    </header>

    <main class="panel-layout">
      <section class="dash-col">
        <p class="eyebrow">Publish</p>
        <h2>Announce a show</h2>

        <form id="concert-form" novalidate>
          <div data-error hidden></div>

          <div class="field">
            <label for="venueName">Venue</label>
            <input type="text" id="venueName" name="venueName" required />
          </div>

          <div class="field">
            <label for="eventDate">Date &amp; time</label>
            <input type="datetime-local" id="eventDate" name="eventDate" required />
          </div>

          <div class="field">
            <label for="description">Details</label>
            <input type="text" id="description" name="description" placeholder="What should fans know?" />
          </div>

          <div class="field">
            <label for="ticketLink">Ticket link (optional)</label>
            <input type="url" id="ticketLink" name="ticketLink" placeholder="https://…" />
          </div>

          <div class="field">
            <label for="bannerFile">Event banner (optional)</label>
            <input type="file" id="bannerFile" name="bannerFile" accept="image/*" />
          </div>

          <button type="submit" class="btn btn-primary" data-submit data-default-label="Publish to the Live Grid">Publish to the Live Grid</button>
        </form>
      </section>

      <section class="dash-col">
        <p class="eyebrow">Your shows</p>
        <h2>Published concerts</h2>
        <div id="my-concerts" class="stack">
          <p class="empty-state">Nothing published yet — your first show will appear here.</p>
        </div>
      </section>
    </main>
  </div>

  <script type="module">
    import { requireAuth, handleSignOut } from "./auth.js";
    import { db } from "./firebase-config.js";
    import {
      doc, getDoc, collection, addDoc, query, where, getDocs, Timestamp
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const CLOUD_NAME = "dflbqacnt";
    const UPLOAD_PRESET = "amp_media";

    let currentUid = null;

    requireAuth(async (user) => {
      currentUid = user.uid;
      const userSnap = await getDoc(doc(db, "users", user.uid));
      const data = userSnap.data();

      if (data.role !== "ARTIST") {
        window.location.href = "dashboard.html";
        return;
      }

      const meta = data.artistMetadata || {};
      const badge = document.getElementById("status-badge");
      if (meta.isVerified && meta.isActive) {
        badge.textContent = "Pro";
        badge.classList.add("badge-pro");
      } else if (!meta.isActive) {
        badge.textContent = "Inactive — billing needed";
      } else {
        badge.textContent = "Pending verification";
      }

      loadMyConcerts(user.uid);
    });

    async function loadMyConcerts(uid) {
      const q = query(collection(db, "concerts"), where("artistId", "==", uid));
      const snap = await getDocs(q);
      if (snap.empty) return;

      const list = document.getElementById("my-concerts");
      list.innerHTML = "";
      snap.forEach((docSnap) => {
        const c = docSnap.data();
        const item = document.createElement("div");
        item.className = "list-item";
        const when = c.eventDate?.toDate ? c.eventDate.toDate().toLocaleString() : "";
        item.innerHTML = `<strong>${c.venueName}</strong><span class="meta">${when}</span>`;
        list.appendChild(item);
      });
    }

    async function uploadToCloudinary(file) {
      const formData = new FormData();
      formData.append("file", file);
      formData.append("upload_preset", UPLOAD_PRESET);

      const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`, {
        method: "POST",
        body: formData
      });
      if (!res.ok) throw new Error("Cloudinary upload failed");
      const data = await res.json();
      return data.secure_url;
    }

    document.getElementById("concert-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const form = e.target;
      const submitBtn = form.querySelector("[data-submit]");
      const errorEl = form.querySelector("[data-error]");
      submitBtn.disabled = true;
      submitBtn.textContent = "Publishing…";

      try {
        let bannerImage = null;
        const file = form.bannerFile.files[0];
        if (file) {
          bannerImage = await uploadToCloudinary(file);
        }

        await addDoc(collection(db, "concerts"), {
          artistId: currentUid,
          venueName: form.venueName.value.trim(),
          eventDate: Timestamp.fromDate(new Date(form.eventDate.value)),
          description: form.description.value.trim() || null,
          ticketLink: form.ticketLink.value.trim() || null,
          bannerImage,
          interestedCount: 0
        });

        window.location.reload();
      } catch (err) {
        console.error("Couldn't publish concert:", err);
        errorEl.textContent = "Something went wrong publishing that. Please try again.";
        errorEl.hidden = false;
        submitBtn.disabled = false;
        submitBtn.textContent = "Publish to the Live Grid";
      }
    });

    document.getElementById("signout-btn").addEventListener("click", handleSignOut);
  </script>
</body>
</html>
