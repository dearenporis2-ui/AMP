<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AMP — Local Music, Live</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="view"></div>

  <div id="player-bar" class="player-bar" hidden>
    <div class="player-track-info">
      <div class="player-art player-art-placeholder"></div>
      <div class="player-track-text">
        <strong id="player-track-title">—</strong>
        <span id="player-track-artist" class="meta"></span>
      </div>
    </div>

    <div class="player-controls">
      <button type="button" id="player-playpause" class="btn-transport"></button>
      <span id="player-current-time" class="mono">0:00</span>
      <input type="range" id="player-seek" class="player-range" min="0" max="100" value="0" />
      <span id="player-duration" class="mono">0:00</span>
    </div>

    <div class="player-volume">
      <span class="icon-volume"></span>
      <input type="range" id="player-volume" class="player-range" min="0" max="100" value="100" />
    </div>

    <button type="button" id="player-eq-toggle" class="btn-eq-toggle">
      <span class="icon-eq"></span> EQ
    </button>
  </div>

  <div id="eq-panel" class="eq-panel" hidden>
    <p class="eq-title">Equalizer</p>
    <div class="eq-bands">
      <div class="eq-band">
        <span class="eq-value" id="eq-bass-value">0dB</span>
        <input type="range" id="eq-bass" class="eq-range" min="-15" max="15" value="0" />
        <label for="eq-bass">Bass</label>
      </div>
      <div class="eq-band">
        <span class="eq-value" id="eq-mid-value">0dB</span>
        <input type="range" id="eq-mid" class="eq-range" min="-15" max="15" value="0" />
        <label for="eq-mid">Mid</label>
      </div>
      <div class="eq-band">
        <span class="eq-value" id="eq-treble-value">0dB</span>
        <input type="range" id="eq-treble" class="eq-range" min="-15" max="15" value="0" />
        <label for="eq-treble">Treble</label>
      </div>
    </div>
    <button type="button" id="eq-reset" class="btn-ghost">Reset</button>
    <button type="button" id="eq-advanced-open" class="btn-ghost">Advanced</button>
  </div>

  <div id="eq-advanced" class="eq-advanced-overlay" hidden>
    <div class="eq-advanced-header">
      <button type="button" id="eq-advanced-back" class="icon-btn">‹</button>
      <input type="text" id="eq-preset-name" class="eq-preset-name-input" value="Custom" />
      <button type="button" id="eq-advanced-reset" class="icon-btn" title="Reset all bands">⟲</button>
    </div>

    <div class="eq-advanced-freqs" id="eq-advanced-freqs"></div>
    <svg id="eq-advanced-graph" class="eq-advanced-graph" viewBox="0 0 760 260" preserveAspectRatio="none"></svg>
    <div class="eq-advanced-range-labels">
      <span>Low</span><span>Mid</span><span>High</span>
    </div>

    <div class="eq-advanced-presets" id="eq-advanced-presets"></div>

    <button type="button" id="eq-advanced-save" class="btn btn-primary eq-save-btn">Save preset</button>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
